<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Игра - Смысл слова</title>
		<link rel="stylesheet" href="css/style.css" />
	</head>
	<body>
		<div class="game-container">
			<!-- Панель информации -->
			<div class="info-panel">
				<div class="player-info">
					<span class="player-name" id="currentPlayer">Игрок</span>
				</div>
				<div class="game-stats">
					<div class="stat">
						<span class="stat-label">Уровень:</span>
						<span class="stat-value" id="currentLevel">1</span>
					</div>
					<div class="stat">
						<span class="stat-label">Вопрос:</span>
						<span class="stat-value"
							><span id="currentQuestion">1</span>/<span id="totalQuestions"
								>5</span
							></span
						>
					</div>
					<div class="stat">
						<span class="stat-label">Очки:</span>
						<span class="stat-value" id="score">0</span>
					</div>
					<div class="stat timer">
						<span class="stat-label">⏱️ Время:</span>
						<span class="stat-value" id="timer">60</span>
					</div>
				</div>
			</div>

			<!-- Игровое поле -->
			<div class="game-area" id="gameArea">
				<!-- Динамически генерируемый контент -->
			</div>

			<!-- Кнопки управления -->
			<div class="game-controls">
				<button id="checkBtn" class="btn btn-primary">Проверить</button>
				<button id="skipBtn" class="btn btn-secondary">Пропустить</button>
				<button id="exitBtn" class="btn btn-danger">
					Завершить игру (Escape)
				</button>
			</div>
		</div>

		<!-- Модальное окно результата -->
		<div id="resultModal" class="modal">
			<div class="modal-content">
				<h2 id="resultTitle">Результат</h2>
				<p id="resultMessage"></p>
				<button id="nextBtn" class="btn btn-primary">Продолжить</button>
			</div>
		</div>

		<!-- Модальное окно подтверждения -->
		<div id="confirmModal" class="modal">
			<div class="modal-content">
				<h2 id="confirmTitle">Подтверждение</h2>
				<p id="confirmMessage"></p>
				<div style="display: flex; gap: 10px; justify-content: center">
					<button id="confirmYesBtn" class="btn btn-primary">Да</button>
					<button id="confirmNoBtn" class="btn btn-secondary">Нет</button>
				</div>
			</div>
		</div>

		<!-- Модальное окно финала -->
		<div id="finalModal" class="modal">
			<div class="modal-content final">
				<h2>🎉 Игра завершена!</h2>
				<div class="final-stats">
					<p>Ваш результат: <strong id="finalScore">0</strong> очков</p>
					<p>Пройдено уровней: <strong id="finalLevel">0</strong></p>
				</div>
				<button id="restartBtn" class="btn btn-primary">Играть снова</button>
				<button id="levelsPageBtn" class="btn btn-secondary">
					Выбрать уровень
				</button>
				<button id="ratingPageBtn" class="btn btn-secondary">
					Таблица лидеров
				</button>
			</div>
		</div>

		<script src="js/data.js"></script>
		<script src="js/storage.js"></script>
		<script src="js/game.js"></script>
	</body>
</html>
